<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>席替えさん｜教室座席表アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ▼ 外部テーマCSS（参考画像寄せトンマナ） -->
  <link rel="stylesheet" href="./lib/theme-mint.css?v=2" />

  <!-- ▼ ページ固有のスケール＆レイアウト最小セット（後勝ちでOK） -->
  <style>
    /* Reset（最小） */
    *,*::before,*::after{ box-sizing:border-box; }
    html,body{ height:100%; }
    body,h1,h2,p{ margin:0; }
    a{ color:inherit; text-decoration:none; }

    /* レイアウトの骨格のみ（色や雰囲気は外部CSSに委譲） */
    :root{
      /* ヒーロー周りのサイズ調整 */
      --title: clamp(54px, 9.2vw, 108px);
      --catch: clamp(13px, 1.8vw, 16px);
      --gap-title-actions: clamp(44px, 6.8vw, 88px);

      /* ボタンのサイズ感 */
      --btn-minw: 236px;
      --btn-pad-y: 12px;
      --btn-pad-x: 20px;
      --btn-fs: 15px;

      /* セクション本文 */
      --feat-h: 12px;
      --feat-label: 12px;
      --feat-p: 12px;
      --feat-line: 1.55;

      /* 中央カラム幅 */
      --max: 960px;
    }

    .viewport{
      min-height:100svh;
      display:grid;
      grid-template-rows: 0.60fr 0.40fr;
    }
    .container{ max-width:var(--max); margin:0 auto; padding:0 24px; }

    /* Hero */
    .hero{ display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .catch{ font-size:var(--catch); letter-spacing:.16em; margin-bottom:8px; }
    .title{ font-size:var(--title); font-weight:800; letter-spacing:.02em; line-height:1.04; margin-bottom:0; }
    .actions{
      display:flex; flex-wrap:wrap; justify-content:center; gap:12px;
      margin-top: var(--gap-title-actions);
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      min-width: var(--btn-minw);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      font-size: var(--btn-fs); font-weight:700;
    }

    /* Features */
    .features{ display:flex; align-items:flex-start; padding-top: 12px; }
    .features .inner{
      width:100%;
      display:grid;
      grid-template-columns: 1fr 2fr;
      gap:12px 28px;
      align-items:start;
    }
    .features h2{
      grid-column:1/-1;
      font-size:var(--feat-h);
      letter-spacing:.12em;
      text-align:center;
      margin-bottom:2px;
    }
    .labels{ display:grid; gap:8px; }
    .label{
      font-size:var(--feat-label);
      font-weight:700;
      letter-spacing:.05em;
      border-left-width:3px; padding-left:8px;
      line-height:1.45; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;
    }
    .desc{ display:grid; gap:6px; font-size:var(--feat-p); line-height:var(--feat-line); }
    .desc p{ margin:0; }

    /* Mock image（最下部のイメージ） */
    .mock { margin: 48px auto 40px; padding: 0 24px; max-width: var(--max); }
    .mock figure { margin: 0; display: grid; gap: 10px; justify-items: center; }
    .mock .frame { width: 100%; padding: 14px; } /* 枠や影は外部CSSで付与 */
    .mock img { display:block; max-width:100%; height:auto; border-radius: 12px; }
    .mock figcaption { font-size:12px; letter-spacing:.02em; text-align:center; }

    /* 高さの低い画面での微調整（任意） */
    @media (max-height: 760px){
      :root{ --gap-title-actions: clamp(40px, 6.4vw, 84px); }
      .viewport{ grid-template-rows: 0.58fr 0.42fr; }
    }
    @media (max-height: 700px){
      :root{ --gap-title-actions: clamp(36px, 6vw, 80px); }
      .viewport{ grid-template-rows: 0.56fr 0.44fr; }
    }

    /* 幅が狭い場合 */
    @media (max-width: 860px){
      .features .inner{ grid-template-columns:1fr; gap:10px; }
      .labels{ grid-template-columns:1fr 1fr; gap:8px 12px; }
      .label{ white-space:normal; }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <!-- Hero -->
    <header class="container hero" role="banner">
      <p class="catch">席替え“業務”を一瞬で</p>
      <h1 class="title">席替えさん</h1>
      <nav class="actions" aria-label="メイン操作">
        <a class="btn" href="./setup">初期設定</a>
        <a class="btn" href="./seats">座席データ読み込み</a>
      </nav>
    </header>

    <!-- Features -->
    <section class="container features" aria-labelledby="feature-heading">
      <div class="inner">
        <h2 id="feature-heading">機能紹介</h2>
        <div class="labels" aria-label="機能項目">
          <div class="label">全画面表示モード</div>
          <div class="label">空席の固定設定</div>
          <div class="label">180度回転表示</div>
          <div class="label">一発印刷レイアウト</div>
          <div class="label">ブラウザ完結で安心</div>
        </div>
        <div class="desc">
          <p>プロジェクターに映して、クラス全員で結果を一目で確認できます。</p>
          <p>欠席者や教室の構造に合わせた「空席」を自由に配置・固定できます。</p>
          <p>先生側と生徒側（黒板側）の視点をワンタップで切り替え可能です。</p>
          <p>A4 最適レイアウトで、印刷してそのまま掲示できます。</p>
          <p>名簿データは端末内のみで処理され、サーバーへ送信されません。</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Mock image: イメージ画像（ページ最下部） -->
  <section class="mock" aria-labelledby="mock-heading">
    <figure>
      <div class="frame">
        <!-- GitHub Pages では、このPNGを公開ブランチに必ず配置してください -->
        <img
          src="./seats-preview.png"
          alt="座席表のイメージ（通常シートと180°回転シートの切り替え、教卓、各席の名前表示）"
          width="1200" height="780" />
      </div>
      <figcaption id="mock-heading">イメージ：座席表の表示サンプル</figcaption>
    </figure>
  </section>
</body>
</html>
