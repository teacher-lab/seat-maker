<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>席替えさん｜教室座席表アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>/* ====== Tonal Theme: Soft Mint UI（画像のトンマナに合わせる） ====== */

/* 1) パレット（ベース＝ミントグリーン） */
:root{
  --mint-50:  #f0f9f4;
  --mint-100: #e6f5ee;
  --mint-200: #d3efe3;
  --mint-300: #b9e7d3;
  --mint-400: #8fd9bd;
  --mint-500: #5fcc9f;   /* 基調 */
  --mint-600: #39bb88;   /* アクション/ホバー */
  --mint-700: #2c9b71;   /* アクション/押下 */
  --ink-900:  #0f172a;   /* 文字濃色 */
  --ink-700:  #334155;   /* 見出し/ラベル */
  --ink-500:  #64748b;   /* サブテキスト */

  /* 既存トークンの置き換え（安全に上書き） */
  --bg: var(--mint-50);
  --fg: var(--ink-900);
  --fg-weak: var(--ink-500);
  --border: rgba(16,24,40,.18);

  /* 角丸・影（やわらかい雰囲気） */
  --radius: 12px;
  --elev-1: 0 1px 2px rgba(16,24,40,.04), 0 1px 1px rgba(16,24,40,.03);
  --elev-2: 0 6px 18px rgba(16,24,40,.08);

  /* コンポーネント色 */
  --card-bg: #fff;
  --card-border: rgba(16,24,40,.14);

  --btn-solid-bg: var(--mint-600);
  --btn-solid-bg-hover: var(--mint-700);
  --btn-solid-fg: #fff;

  --btn-ghost-fg: var(--mint-700);
  --btn-ghost-border: rgba(56,142,108,.35);
  --btn-ghost-bg-hover: rgba(56,142,108,.08);

  --focus-ring: 0 0 0 3px rgba(63,201,150,.28);
}

/* 2) ページ背景を淡いグラデに（上部うっすら緑→下白） */
body{
  background:
    radial-gradient(1200px 320px at 50% -120px, var(--mint-100), transparent 70%),
    linear-gradient(to bottom, var(--mint-50), #ffffff 40%);
  color: var(--fg);
}

/* 3) ヒーローもトンマナを合わせる（うっすら帯＋アイコン風左端） */
.hero{
  background: linear-gradient(to bottom, rgba(143,217,189,.10), rgba(143,217,189,0) 80%);
  border-radius: 0 0 20px 20px;
  padding: 16px 0 12px; /* 少しだけゆとり */
}
.title{
  letter-spacing:.015em;
}
.catch{
  color: var(--ink-500);
}

/* 4) ボタン（濃淡2種） */
.actions{ gap: 12px; }
.btn{
  border-radius: 999px;            /* pill */
  border: 1.5px solid transparent; /* 基本は透明境界 */
  box-shadow: var(--elev-1);
  transition: all .14s ease;
}

/* 実線のグリーンボタン（主要） */
.btn[href]{
  background: var(--btn-solid-bg);
  color: var(--btn-solid-fg);
}
.btn[href]:hover{
  background: var(--btn-solid-bg-hover);
  transform: translateY(-1px);
  box-shadow: var(--elev-2);
}
.btn[href]:active{
  transform: translateY(0);
  box-shadow: var(--elev-1);
}

/* ゴースト（サブ）— 使いたいときは .btn-ghost を追加 */
.btn-ghost{
  background: #fff;
  color: var(--btn-ghost-fg);
  border-color: var(--btn-ghost-border);
}
.btn-ghost:hover{ background: var(--btn-ghost-bg-hover); }

/* フォーカス可視 */
.btn:focus-visible{ outline: none; box-shadow: var(--focus-ring); }

/* 5) カード（Featuresの箱っぽい見た目に） */
.features .inner{
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  box-shadow: var(--elev-1);
  padding: 18px 20px;
}
.features h2{
  color: var(--ink-700);
  letter-spacing:.12em;
}
.label{
  border-left: 3px solid var(--mint-400);
  color: var(--ink-700);
}

/* 6) フォーム/入力UI（setup.html などにも効く共通スタイル） */
input[type="text"], input[type="number"], input[type="file"],
textarea, select{
  appearance: none;
  width: 100%;
  background: #fff;
  color: var(--fg);
  border: 1.5px solid rgba(16,24,40,.18);
  border-radius: 10px;
  padding: 10px 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.7), var(--elev-1);
  transition: border-color .12s ease, box-shadow .12s ease, background .12s ease;
}
input::file-selector-button{
  background: var(--mint-600);
  color:#fff;
  border: none;
  border-radius: 999px;
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
}
input:hover, textarea:hover, select:hover{
  border-color: rgba(16,24,40,.28);
}
input:focus, textarea:focus, select:focus{
  outline: none;
  border-color: var(--mint-600);
  box-shadow: var(--focus-ring);
}

/* 7) バッジ/小ボタン（右上の「名簿テンプレ」風） */
.badge-btn{
  display:inline-flex; align-items:center; gap:6px;
  background:#fff;
  color: var(--mint-700);
  border:1.5px solid rgba(56,142,108,.35);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight:700; font-size:13px;
  box-shadow: var(--elev-1);
}
.badge-btn:hover{ background: rgba(56,142,108,.06); }

/* 8) ページ下部のMock画像フレームも合わせる */
.mock .frame{
  background:#fff;
  border:1px solid var(--card-border);
  border-radius: 14px;
  box-shadow: var(--elev-2);
}
.mock figcaption{ color: var(--ink-500); }

/* 9) フッター操作バー（次へ/戻る などがある場合） */
.footer-bar{
  position: sticky; bottom: 0;
  background: linear-gradient(to top, rgba(255,255,255,.96), rgba(255,255,255,0));
  backdrop-filter: saturate(140%) blur(6px);
  padding: 10px 16px;
  border-top: 1px solid rgba(16,24,40,.08);
}

/* 10) ダークモード（淡い色味を保ったまま反転） */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0f14;
    --card-bg:#0e1319;
    --card-border: rgba(255,255,255,.10);
    --fg:#e5e7eb; --fg-weak:#cbd5e1;
    --border: rgba(255,255,255,.16);
  }
  body{
    background:
      radial-gradient(1200px 320px at 50% -120px, rgba(63,201,150,.10), transparent 70%),
      linear-gradient(to bottom, #0b1116, #0b0f14 40%);
  }
  .btn-ghost{ background: transparent; }
  input, textarea, select{ background:#0f151c; color:#e5e7eb; border-color: rgba(255,255,255,.16); }
}
    /* ===== Reset ===== */
    *,*::before,*::after{ box-sizing:border-box; }
    html,body{ height:100%; }
    body,h1,h2,p{ margin:0; }
    a{ color:inherit; text-decoration:none; }

    /* ===== Theme tokens ===== */
    :root{
      --fg:#0f172a;        /* 文字色 */
      --fg-weak:#64748b;   /* サブテキスト */
      --bg:#f6f8fb;        /* 背景 */
      --border:#0f172a;    /* ボタン枠 */
      --max:900px;         /* コンテナ幅 */
      --radius:8px;

      /* タイトル：左画像寄りに少し大きめ（最大108pxまで） */
      --title: clamp(54px, 9.2vw, 108px);
      --catch: clamp(13px, 1.8vw, 16px);

      /* ▼ タイトルとボタン（.actions）の隙間：ここだけで調整 */
      --gap-title-actions: clamp(44px, 6.8vw, 88px);

      /* ボタン（少しだけスリムに） */
      --btn-minw: 236px;
      --btn-pad-y: 12px;
      --btn-pad-x: 20px;
      --btn-fs: 15px;

      /* 機能説明（コンパクト） */
      --feat-h: 12px;
      --feat-label: 12px;
      --feat-p: 12px;
      --feat-line: 1.55;

      /* ボタン同士の間隔（やや詰め） */
      --actions-gap: 14px;
    }

    @media (prefers-color-scheme: dark){
      :root{ --fg:#e5e7eb; --fg-weak:#cbd5e1; --bg:#0b0f14; --border:#e5e7eb; }
    }

    body{
      background:var(--bg);
      color:var(--fg);
      font-family:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",Roboto,
                  "Helvetica Neue","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    /* ===== Viewport layout ===== */
    .viewport{
      min-height:100svh;
      display:grid;
      grid-template-rows: 0.60fr 0.40fr;
    }
    .container{ max-width:var(--max); margin:0 auto; padding:0 20px; }

    /* ===== Hero ===== */
    .hero{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center;
      padding: 6px 0 8px; /* 下余白を少し詰める */
    }
    .catch{
      font-size:var(--catch);
      letter-spacing:.16em;
      color:var(--fg-weak);
      margin-bottom:8px;
    }
    .title{
      font-size:var(--title);
      font-weight:700;
      letter-spacing:.03em;
      line-height:1.03;
      margin-bottom:0; /* 距離は .actions で管理 */
    }
    .actions{
      display:flex; gap:var(--actions-gap); flex-wrap:wrap; justify-content:center;
      margin-top: var(--gap-title-actions);
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      min-width: var(--btn-minw);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      font-size: var(--btn-fs);
      font-weight:700;
      background:transparent;
      color:var(--fg);
      border:2px solid var(--border);
      border-radius:var(--radius);
      transition:background .14s ease, color .14s ease, transform .06s ease, border-color .14s ease;
    }
    .btn:hover{ background:var(--fg); color:#fff; border-color:var(--fg); }
    .btn:active{ transform:translateY(1px) scale(.995); }
    .btn:focus-visible{ outline:none; box-shadow:0 0 0 3px rgba(15,23,42,.22); }

    /* ===== Features ===== */
    .features{
      display:flex; align-items:flex-start;
      padding-top: 0; /* ヒーロー直下に詰める */
    }
    .features .inner{
      width:100%;
      display:grid;
      grid-template-columns: 1fr 2fr;
      gap:12px 28px;
      align-items:start;
    }
    .features h2{
      grid-column:1/-1;
      font-size:var(--feat-h);
      letter-spacing:.14em;
      color:var(--fg-weak);
      text-align:center;
      margin-bottom:0;
    }
    .labels{ display:grid; gap:8px; }
    .label{
      font-size:var(--feat-label);
      font-weight:700;
      letter-spacing:.05em;
      border-left:2px solid var(--border);
      padding-left:8px;
      line-height:1.45;
      white-space:nowrap; text-overflow:ellipsis; overflow:hidden;
    }
    .desc{
      display:grid; gap:6px;
      font-size:var(--feat-p);
      line-height:var(--feat-line);
      color:var(--fg);
    }
    .desc p{ margin:0; }

    /* ===== 画面が低い場合も詰め具合を維持 ===== */
    @media (max-height: 760px){
      :root{ --gap-title-actions: clamp(40px, 6.4vw, 84px); }
      .viewport{ grid-template-rows: 0.58fr 0.42fr; }
    }
    @media (max-height: 700px){
      :root{ --gap-title-actions: clamp(36px, 6vw, 80px); }
      .viewport{ grid-template-rows: 0.56fr 0.44fr; }
    }

    /* ===== 幅が狭い場合 ===== */
    @media (max-width: 860px){
      .features .inner{ grid-template-columns:1fr; gap:10px; }
      .labels{ grid-template-columns:1fr 1fr; gap:8px 12px; }
      .label{ white-space:normal; }
    }

    /* ===== Mock image（ページ最下部のイメージ画像） ===== */
    .mock {
      margin: 48px auto 40px;     /* 上下の余白 */
      padding: 0 20px;            /* コンテナと同じ左右余白 */
      max-width: var(--max);      /* 本文幅に中央寄せ */
    }
    .mock figure {
      margin: 0;
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .mock .frame {
      width: 100%;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px;              /* 画像周囲の余白 */
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
    }
    .mock img {
      display: block;
      max-width: 100%;            /* 横幅フィット */
      height: auto;               /* アスペクト比維持 */
      border-radius: 8px;
    }
    .mock figcaption {
      font-size: 12px;
      color: var(--fg-weak);
      text-align: center;
      letter-spacing: .02em;
    }
    @media (prefers-color-scheme: dark){
      .mock .frame{ background: #0b0f14; box-shadow: 0 6px 18px rgba(0,0,0,.35); }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <!-- Hero -->
    <header class="container hero" role="banner">
      <p class="catch">席替え“業務”を一瞬で</p>
      <h1 class="title">席替えさん</h1>
      <nav class="actions" aria-label="メイン操作">
        <a class="btn" href="./setup">初期設定</a>
        <a class="btn" href="./seats">座席データ読み込み</a>
      </nav>
    </header>

    <!-- Features -->
    <section class="container features" aria-labelledby="feature-heading">
      <div class="inner">
        <h2 id="feature-heading">機能紹介</h2>
        <div class="labels" aria-label="機能項目">
          <div class="label">全画面表示モード</div>
          <div class="label">空席の固定設定</div>
          <div class="label">180度回転表示</div>
          <div class="label">一発印刷レイアウト</div>
          <div class="label">ブラウザ完結で安心</div>
        </div>
        <div class="desc">
          <p>プロジェクターに映して、クラス全員で結果を一目で確認できます。</p>
          <p>欠席者や教室の構造に合わせた「空席」を自由に配置・固定できます。</p>
          <p>先生側と生徒側（黒板側）の視点をワンタップで切り替え可能です。</p>
          <p>A4 最適レイアウトで、印刷してそのまま掲示できます。</p>
          <p>名簿データは端末内のみで処理され、サーバーへ送信されません。</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Mock image: イメージ画像（ページ最下部） -->
  <section class="mock" aria-labelledby="mock-heading">
    <figure>
      <div class="frame">
        <!-- ここが決定版：同一階層の seats-preview.png を読み込み -->
        <img
          src="./seats-preview.png"
          alt="座席表のイメージ（通常シートと180°回転シートの切り替え、教卓、各席の名前表示）"
          width="1000" height="650"
          loading="lazy"
        />
      </div>
      <figcaption id="mock-heading">イメージ：座席表の表示サンプル</figcaption>
    </figure>
  </section>
</body>
</html>
