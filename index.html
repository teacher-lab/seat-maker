<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>席替えさん｜教室座席表アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ===== Reset（最小限） ===== */
    *,*::before,*::after{ box-sizing:border-box; }
    html,body{ height:100%; }
    body,h1,h2,p{ margin:0; }
    a{ color:inherit; text-decoration:none; }

    /* ===== Theme Tokens（単色背景／ミント系のUI） ===== */
    :root{
      /* 背景は単色（グラデなし） */
      --bg: #eef7f1;

      /* 文字色 */
      --fg: #0f172a;
      --fg-weak: #667085;

      /* 薄い枠線・影・角丸 */
      --line: rgba(17,24,39,.12);
      --card-border: var(--line);
      --radius-s: 8px;
      --radius-m: 12px;
      --radius-l: 16px;
      --elev-1: 0 1px 2px rgba(16,24,40,.05);
      --elev-2: 0 6px 18px rgba(16,24,40,.08);

      /* コンテナ幅 */
      --max: 960px;

      /* タイポ（ページ固有スケール） */
      --title: clamp(54px, 9.2vw, 108px);
      --catch: clamp(13px, 1.8vw, 16px);
      --gap-title-actions: clamp(44px, 6.8vw, 88px);

      /* ボタンのサイズ感（ページ固有） */
      --btn-minw: 236px;
      --btn-pad-y: 14px;
      --btn-pad-x: 22px;
      --btn-fs: 16px;

      /* ボタン色（参考画像の濃いグリーン） */
      --btn-green:       #177a3a;
      --btn-green-hover: #126532;
      --btn-green-active:#0f5529;
      --btn-ring:        rgba(23,122,58,.28);

      /* Features セクションの文字 */
      --feat-h: 12px;
      --feat-label: 12px;
      --feat-p: 12px;
      --feat-line: 1.55;
    }

    /* ===== Base ===== */
    html, body{ background: var(--bg); color: var(--fg); }
    body{
      font-family: "Noto Sans JP", system-ui, -apple-system, "Segoe UI", Roboto,
                   "Helvetica Neue","Hiragino Sans","Yu Gothic UI","Yu Gothic", Meiryo, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .container{ max-width: var(--max); margin: 0 auto; padding: 0 24px; }
    .viewport{
      min-height: 100svh;
      display: grid;
      grid-template-rows: 0.60fr 0.40fr;
    }

    /* ===== Hero（グラデなし。帯もナシでフラット） ===== */
    .hero{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center;
      padding: 18px 0 12px;
    }
    .catch{
      font-size: var(--catch);
      letter-spacing: .16em;
      color: var(--fg-weak);
      margin-bottom: 8px;
    }
    .title{
      font-size: var(--title);
      font-weight: 800;
      letter-spacing: .02em;
      line-height: 1.04;
      margin-bottom: 0;
    }
    .actions{
      display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
      margin-top: var(--gap-title-actions);
    }

    /* ===== Buttons：参考画像の濃いグリーンのピル型 ===== */
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      min-width: var(--btn-minw);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      font-size: var(--btn-fs); font-weight: 800; line-height:1;
      color:#fff;
      background: var(--btn-green);
      border: none;
      border-radius: 999px;                 /* ピル */
      box-shadow: var(--elev-1);
      transition: background .14s ease, transform .08s ease, box-shadow .14s ease;
      text-wrap: nowrap;
    }
    .btn:hover{
      background: var(--btn-green-hover);
      transform: translateY(-1px);
      box-shadow: var(--elev-2);
    }
    .btn:active{
      background: var(--btn-green-active);
      transform: none;
      box-shadow: var(--elev-1);
    }
    .btn:focus-visible{ outline:none; box-shadow: 0 0 0 3px var(--btn-ring); }
    .btn.btn-next::after{
      content: "➔"; font-weight: 900; font-size: 18px; line-height: 1;
    }

    /* ===== Features（白カード＋極薄枠＋やわらか影） ===== */
    .features{ display:flex; align-items:flex-start; padding-top: 12px; }
    .features .inner{
      width:100%;
      display:grid; grid-template-columns: 1fr 2fr; gap:12px 28px; align-items:start;
      background:#fff; border:1px solid var(--card-border); border-radius: var(--radius-l); box-shadow: var(--elev-1);
      padding: 20px 22px;
    }
    .features h2{
      grid-column: 1 / -1;
      font-size: var(--feat-h);
      color: var(--fg-weak);
      letter-spacing: .12em;
      text-align: center;
      margin-bottom: 2px;
    }
    .labels{ display:grid; gap:8px; }
    .label{
      font-size: var(--feat-label);
      font-weight: 700;
      letter-spacing: .05em;
      border-left: 3px solid rgba(57,187,136,.35);
      padding-left: 8px;
      line-height: 1.45;
      white-space: nowrap; text-overflow: ellipsis; overflow: hidden;
      color: #344054;
    }
    .desc{ display:grid; gap:6px; font-size: var(--feat-p); line-height: var(--feat-line); color: var(--fg); }
    .desc p{ margin:0; }

    /* ===== Mock image（ページ最下部のイメージ） ===== */
    .mock { margin: 48px auto 40px; padding: 0 24px; max-width: var(--max); }
    .mock figure { margin: 0; display: grid; gap: 10px; justify-items: center; }
    .mock .frame{
      width: 100%;
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--elev-2);
    }
    .mock img{ display:block; max-width:100%; height:auto; border-radius: 12px; }
    .mock figcaption{ font-size:12px; color: var(--fg-weak); letter-spacing:.02em; text-align:center; }

    /* ===== Responsive ===== */
    @media (max-width: 860px){
      .features .inner{ grid-template-columns:1fr; gap:10px; }
      .labels{ grid-template-columns: 1fr 1fr; gap:8px 12px; }
      .label{ white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <!-- Hero -->
    <header class="container hero" role="banner">
      <p class="catch">席替え“業務”を一瞬で</p>
      <h1 class="title">席替えさん</h1>
      <nav class="actions" aria-label="メイン操作">
        <!-- 参考画像のボタン：濃いグリーン、右矢印 -->
        <a class="btn btn-next" href="./setup">初期設定</a>
        <a class="btn btn-next" href="./seats">座席データ読み込み</a>
      </nav>
    </header>

    <!-- Features -->
    <section class="container features" aria-labelledby="feature-heading">
      <div class="inner">
        <h2 id="feature-heading">機能紹介</h2>
        <div class="labels" aria-label="機能項目">
          <div class="label">全画面表示モード</div>
          <div class="label">空席の固定設定</div>
          <div class="label">180度回転表示</div>
          <div class="label">一発印刷レイアウト</div>
          <div class="label">ブラウザ完結で安心</div>
        </div>
        <div class="desc">
          <p>プロジェクターに映して、クラス全員で結果を一目で確認できます。</p>
          <p>欠席者や教室の構造に合わせた「空席」を自由に配置・固定できます。</p>
          <p>先生側と生徒側（黒板側）の視点をワンタップで切り替え可能です。</p>
          <p>A4 最適レイアウトで、印刷してそのまま掲示できます。</p>
          <p>名簿データは端末内のみで処理され、サーバーへ送信されません。</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Mock image: イメージ画像（ページ最下部） -->
  <section class="mock" aria-labelledby="mock-heading">
    <figure>
      <div class="frame">
        <!-- GitHub Pages では、このPNGを公開ブランチに必ず配置してください -->
        <img src="./seats-preview.png"
             alt="座席表のイメージ（シンプルなUIで、基本レイアウトや名簿入力が分かるサンプル）"
             width="1000" height="650" />
      </div>
      <figcaption id="mock-heading">イメージ：座席表の表示サンプル</figcaption>
    </figure>
  </section>
</body>
</html>
