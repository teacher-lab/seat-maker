<style>
/* ===== Reset ===== */
*,*::before,*::after{ box-sizing:border-box; }
html,body{ height:100%; }
body,h1,h2,p{ margin:0; }
a{ color:inherit; text-decoration:none; }

/* ===== Theme ===== */
:root{
  --bg: #eef7f1; /* 単色ミント背景 */
  --fg: #0f172a;
  --fg-weak:#667085;

  --line: rgba(17,24,39,.12);
  --radius-m:12px;
  --radius-l:16px;
  --elev-1:0 1px 2px rgba(0,0,0,.05);
  --elev-2:0 6px 18px rgba(0,0,0,.08);

  --max:960px;

  /* タイトルスケール */
  --title: clamp(54px, 9.2vw, 108px);
  --catch: clamp(13px, 1.8vw, 16px);
  --gap-title-actions: clamp(44px, 6.8vw, 88px);

  /* ボタン（例のデザイン） */
  --btn-green:#177a3a;
  --btn-green-hover:#126532;
  --btn-green-active:#0f5529;
  --btn-ring:rgba(23,122,58,.28); 
  --btn-minw:236px;
  --btn-pad-y:14px;
  --btn-pad-x:22px;
  --btn-fs:16px;

  /* features */
  --feat-h:12px;
  --feat-label:12px;
  --feat-p:12px;
  --feat-line:1.55;
}

/* ===== Base ===== */
html,body{
  background: var(--bg);   /* ← グラデなし、単色 */
  color: var(--fg);
}
body{
  font-family:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",Roboto,
    "Helvetica Neue","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ===== Layout ===== */
.container{ max-width:var(--max); margin:0 auto; padding:0 24px; }
.viewport{
  min-height:100svh;
  display:grid;
  grid-template-rows:0.60fr 0.40fr;
}

/* ===== Hero ===== */
.hero{
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center;
  padding:18px 0 12px;
}
.catch{
  font-size:var(--catch);
  letter-spacing:.16em;
  color:var(--fg-weak);
  margin-bottom:8px;
}
.title{
  font-size:var(--title);
  font-weight:800;
  letter-spacing:.02em;
  line-height:1.04;
}

/* ===== Buttons（完全復活版） ===== */
.actions{
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin-top: var(--gap-title-actions);
}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  min-width:var(--btn-minw);
  padding:var(--btn-pad-y) var(--btn-pad-x);
  font-size:var(--btn-fs); font-weight:800;
  color:#fff;
  background:var(--btn-green);
  border:none;
  border-radius:999px; /* ピル型 */
  box-shadow:var(--elev-1);
  transition:background .14s ease, transform .08s ease, box-shadow .14s ease;
}
.btn:hover{
  background:var(--btn-green-hover);
  transform:translateY(-1px);
  box-shadow:var(--elev-2);
}
.btn:active{
  background:var(--btn-green-active);
  transform:none;
  box-shadow:var(--elev-1);
}
.btn:focus-visible{
  outline:none;
  box-shadow:0 0 0 3px var(--btn-ring);
}
.btn.btn-next::after{
  content:"➔"; font-weight:900; font-size:18px;
}

/* ===== Features ===== */
.features{ display:flex; align-items:flex-start; padding-top:12px; }
.features .inner{
  width:100%;
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:12px 28px;
  padding:20px 22px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius-l);
  box-shadow:var(--elev-1);
}
.features h2{
  grid-column:1/-1;
  font-size:var(--feat-h);
  letter-spacing:.12em;
  text-align:center;
  margin-bottom:2px;
  color:var(--fg-weak);
}
.label{
  font-size:var(--feat-label);
  font-weight:700;
  border-left:3px solid rgba(23,122,58,.35);
  padding-left:8px;
  color:#344054;
}
.desc{
  display:grid; gap:6px;
  font-size:var(--feat-p);
  line-height:var(--feat-line);
}

/* ===== Mock Image ===== */
.mock{
  margin:48px auto 40px;
  padding:0 24px;
  max-width:var(--max);
}
.mock .frame{
  width:100%;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--elev-2);
}
.mock img{
  display:block;
  max-width:100%;
  border-radius:12px;
}
.mock figcaption{
  text-align:center;
  font-size:12px;
  color:var(--fg-weak);
  margin-top:6px;
}

/* ===== Responsive ===== */
@media (max-width:860px){
  .features .inner{ grid-template-columns:1fr; gap:10px; }
  .labels{ display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; }
  .label{ white-space:normal; }
}
</style>
